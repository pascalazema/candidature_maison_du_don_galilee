  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #002f6c;
      --primary-dark: #001f49;
      --accent: #c62828;
      --radius: 14px;
      --shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg,#fff,#f3f6fb);
      border-bottom: 1px solid var(--line);
      padding: 36px 24px;
    }

    .wrap {
      max-width: 1600px;
      margin: auto;
    }

    .header-layout {
      display: flex;
      justify-content: space-between;
      gap: 30px;
    }

    .profile-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .profile-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .profile-contacts {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      color: #002f6c;
      font-weight: 600;
    }

    .icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .top-actions {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .top-actions-inner {
      max-width: 1600px;
      margin: auto;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
    }

    .btn-primary {
      background: #002f6c;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #002f6c;
      border: 1px solid var(--line);
    }

    .separator {
      width: 1px;
      height: 30px;
      background: #ccc;
      margin: 0 6px;
    }

    main {
      max-width: 1600px;
      margin: 30px auto;
      padding: 0 24px;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: 0;
      border-radius: 10px;
    }
